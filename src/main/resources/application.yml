spring:
  application:
    name: orchestrator-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orchestrator_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: orchestrator-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8093

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  kafka:
    topics:
      # Command topic from document-intake-service
      saga-commands-orchestrator: saga.commands.orchestrator
      # Saga lifecycle event topics
      saga-lifecycle-started: saga.lifecycle.started
      saga-lifecycle-step-completed: saga.lifecycle.step-completed
      saga-lifecycle-completed: saga.lifecycle.completed
      saga-lifecycle-failed: saga.lifecycle.failed
      # Command topics to processing services
      saga-command-invoice: saga.command.invoice
      saga-command-tax-invoice: saga.command.tax-invoice
      saga-command-xml-signing: saga.command.xml-signing
      saga-command-signedxml-storage: saga.command.signedxml-storage
      saga-command-invoice-pdf: saga.command.invoice-pdf
      saga-command-tax-invoice-pdf: saga.command.tax-invoice-pdf
      saga-command-pdf-signing: saga.command.pdf-signing
      saga-command-document-storage: saga.command.document-storage
      saga-command-ebms-sending: saga.command.ebms-sending
      # Reply topics from processing services
      saga-reply-invoice: saga.reply.invoice
      saga-reply-tax-invoice: saga.reply.tax-invoice
      saga-reply-xml-signing: saga.reply.xml-signing
      saga-reply-signedxml-storage: saga.reply.signedxml-storage
      saga-reply-invoice-pdf: saga.reply.invoice-pdf
      saga-reply-taxinvoice-pdf: saga.reply.tax-invoice-pdf
      saga-reply-pdf-signing: saga.reply.pdf-signing
      saga-reply-document-storage: saga.reply.document-storage
      saga-reply-ebms-sending: saga.reply.ebms-sending
  saga:
    command:
      invoice: saga.command.invoice
      tax-invoice: saga.command.tax-invoice
      xml-signing: saga.command.xml-signing
      signedxml-storage: saga.command.signedxml-storage
      invoice-pdf: saga.command.invoice-pdf
      taxinvoice-pdf: saga.command.tax-invoice-pdf
      pdf-signing: saga.command.pdf-signing
      document-storage: saga.command.document-storage
      ebms-sending: saga.command.ebms-sending
    reply:
      invoice: saga.reply.invoice
      tax-invoice: saga.reply.tax-invoice
      document-storage: saga.reply.document-storage
      xml-signing: saga.reply.xml-signing
      invoice-pdf: saga.reply.invoice-pdf
      tax-invoice-pdf: saga.reply.tax-invoice-pdf
      pdf-signing: saga.reply.pdf-signing
      ebms-sending: saga.reply.ebms-sending
    compensation:
      invoice: saga.compensation.invoice
      tax-invoice: saga.compensation.tax-invoice
      xml-signing: saga.compensation.xml-signing
      signedxml-storage: saga.compensation.signedxml-storage
      invoice-pdf: saga.compensation.invoice-pdf
      taxinvoice-pdf: saga.compensation.tax-invoice-pdf
      pdf-signing: saga.compensation.pdf-signing
      document-storage: saga.compensation.document-storage
      ebms-sending: saga.compensation.ebms-sending
    max-retries: 3
    retry-delay-seconds: 5
    compensation-timeout-seconds: 300

logging:
  level:
    com.wpanther.orchestrator: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
